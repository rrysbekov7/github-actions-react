name: Deploy React App
on: 
  push:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get repository code
        uses: actions/checkout@v3
      - name: Install depencies
        run: npm ci
      - name: Test Application
        run: npm run test
  lint:
    runs-on: ubuntu:latest
    needs: test
    steps:
      - name: Get repository code
        uses: actions/checkout@v3
      - name: Install depencies
        run: npm ci
      - name: Lint Application
        run: npm run lint
  build:
    runs-on: ubuntu:latest
    needs: lint
    steps:
      - name: Get repository code
        uses: actions/checkout@v3
      - name: Install depencies
        run: npm ci
      - name: Build Application
        run: npm run build
      - name: Deploy
        run: echo Deploying...